<!DOCTYPE html>
<html lang="en-US">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Forgemon — craft monsters from loot</title>
<style>
  html,body{ margin:0; width:100%; height:100%; background:#0a0814; color:#f4f0ff;
    overflow:hidden; touch-action:none; -webkit-user-select:none; user-select:none;
    -webkit-tap-highlight-color:transparent;
    font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif; }
  #game{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas{ image-rendering:pixelated; touch-action:none; display:block; }

  /* Rotate-to-landscape gate */
  #rotate{ position:fixed; inset:0; z-index:9999; background:#13102a;
    display:none; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:28px; }
  #rotate .icon{ font-size:72px; line-height:1; margin-bottom:18px;
    animation:tilt 1.8s ease-in-out infinite; transform-origin:50% 50%; }
  #rotate h2{ margin:0 0 8px; font-size:24px; color:#ffcf4d; }
  #rotate p{ margin:0; font-size:16px; color:#cfc7ea; max-width:340px; }
  @keyframes tilt{ 0%,35%{transform:rotate(0)} 60%,100%{transform:rotate(-90deg)} }
  @media (orientation: portrait){ #rotate{ display:flex; } }
</style>
</head>
<body>
  <div id="game"></div>
  <div id="rotate">
    <div class="icon">📱</div>
    <h2>Rotate your device</h2>
    <p>Forgemon plays best held sideways. Turn your phone to landscape to start.</p>
  </div>

  <script src="lib/phaser.min.js"></script>
  <script src="src/config.js"></script>
  <script src="src/data.js"></script>
  <script src="src/state.js"></script>
  <script src="src/art.js"></script>
  <script src="src/ui.js"></script>
  <script src="src/dialog.js"></script>
  <script src="src/scenes/BootScene.js"></script>
  <script src="src/scenes/TitleScene.js"></script>
  <script src="src/scenes/WorldScene.js"></script>
  <script src="src/scenes/BattleScene.js"></script>
  <script src="src/scenes/CraftScene.js"></script>
  <script src="src/scenes/PartyScene.js"></script>
  <script src="src/scenes/SettingsScene.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
